<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 20px;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #ffffff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .sparkle { font-size: 20px; }
    .description {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.4;
      margin-bottom: 16px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .toggle-label {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 9999px;
      transition: background 0.3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .toggle input:checked + .slider {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .toggle input:checked + .slider::before {
      transform: translateX(20px);
    }
    .status {
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
    }
    .status.active { color: #667eea; }
  </style>
</head>
<body>
  <div class="header">
    <span class="sparkle">✨</span>
    <h1>AI Slop Mode</h1>
  </div>
  <p class="description">Transform any website into universally approachable, AI-era design. Proven patterns. Instant familiarity.</p>
  <div class="toggle-row">
    <span class="toggle-label">Enable slop</span>
    <label class="toggle">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <p class="status" id="status">Inactive</p>
  <script src="popup.js"></script>
</body>
</html>
